services:
  postgres:
    image: postgres:16-alpine
    container_name: txt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mission_control
      POSTGRES_USER: txt
      POSTGRES_PASSWORD: txt
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U txt -d mission_control"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  control-plane:
    image: txt-python:3.11
    build:
      context: .
      dockerfile: Dockerfile.txt-python
    container_name: control-plane
    restart: unless-stopped
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      SYSTEM_MODE: guarded_auto
      RISK_GATEWAY_URL: http://risk-gateway:8001
      EXECUTION_ROUTER_URL: http://execution-router:8002
      MARKET_DATA_URL: http://market-data:8003
      BROKER_ADAPTER_URL: http://broker-adapter:8004
      AI_ORCHESTRATOR_URL: http://ai-orchestrator:8005
      MT5_BRIDGE_URL: http://mt5-bridge:8006
      EMBEDDINGS_SERVICE_URL: http://embeddings-service:8007
      DATABASE_URL: postgresql://txt:txt@postgres:5432/mission_control
      APPROVAL_HMAC_SECRET: mission-control-secret
    env_file:
      - ./.env
    command: >
      sh -c "uvicorn apps.control_plane.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3); sys.exit(0)"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      risk-gateway:
        condition: service_healthy
      execution-router:
        condition: service_healthy
      market-data:
        condition: service_healthy
      broker-adapter:
        condition: service_healthy
      ai-orchestrator:
        condition: service_healthy
      mt5-bridge:
        condition: service_healthy
      embeddings-service:
        condition: service_healthy

  mt5-bridge:
    image: txt-python:3.11
    container_name: mt5-bridge
    restart: unless-stopped
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      DATABASE_URL: postgresql://txt:txt@postgres:5432/mission_control
      MT5_BRIDGE_MODE: paper
    env_file:
      - ./.env
    command: >
      sh -c "uvicorn apps.mt5_bridge.main:app --host 0.0.0.0 --port 8006"
    ports:
      - "8006:8006"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:8006/health', timeout=3); sys.exit(0)"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy

  embeddings-service:
    image: txt-python:3.11
    container_name: embeddings-service
    restart: unless-stopped
    working_dir: /workspace
    volumes:
      - ./:/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql://txt:txt@postgres:5432/mission_control
    env_file:
      - ./.env
    command: >
      sh -c "uvicorn apps.embeddings_service.main:app --host 0.0.0.0 --port 8007"
    ports:
      - "8007:8007"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:8007/health', timeout=3); sys.exit(0)"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy

  risk-gateway:
    image: txt-python:3.11
    container_name: risk-gateway
    restart: unless-stopped
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      RISK_POLICY_PATH: /workspace/config/risk_policy.json
      DATABASE_URL: postgresql://txt:txt@postgres:5432/mission_control
    command: >
      sh -c "uvicorn apps.risk_gateway.main:app --host 0.0.0.0 --port 8001"
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=3); sys.exit(0)"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy

  execution-router:
    image: txt-python:3.11
    container_name: execution-router
    restart: unless-stopped
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      DATABASE_URL: postgresql://txt:txt@postgres:5432/mission_control
      MARKET_DATA_URL: http://market-data:8003
    command: >
      sh -c "uvicorn apps.execution_router.main:app --host 0.0.0.0 --port 8002"
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:8002/health', timeout=3); sys.exit(0)"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy

  market-data:
    image: txt-python:3.11
    container_name: market-data
    restart: unless-stopped
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      DATABASE_URL: postgresql://txt:txt@postgres:5432/mission_control
    command: >
      sh -c "uvicorn apps.market_data_plane.main:app --host 0.0.0.0 --port 8003"
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:8003/health', timeout=3); sys.exit(0)"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy

  broker-adapter:
    image: txt-python:3.11
    container_name: broker-adapter
    restart: unless-stopped
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      DATABASE_URL: postgresql://txt:txt@postgres:5432/mission_control
      MARKET_DATA_URL: http://market-data:8003
    env_file:
      - ./.env
    command: >
      sh -c "uvicorn apps.broker_adapter.main:app --host 0.0.0.0 --port 8004"
    ports:
      - "8004:8004"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:8004/health', timeout=3); sys.exit(0)"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      market-data:
        condition: service_healthy

  ai-orchestrator:
    image: txt-python:3.11
    container_name: ai-orchestrator
    restart: unless-stopped
    working_dir: /workspace
    volumes:
      - ./:/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql://txt:txt@postgres:5432/mission_control
    env_file:
      - ./.env
    command: >
      sh -c "uvicorn apps.ai_orchestrator.main:app --host 0.0.0.0 --port 8005"
    ports:
      - "8005:8005"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:8005/health', timeout=3); sys.exit(0)"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy

  mission-control-ui:
    image: node:20-alpine
    container_name: mission-control-ui
    restart: unless-stopped
    working_dir: /workspace/ui/mission-control
    volumes:
      - ./:/workspace
    environment:
      PORT: 3000
      CONTROL_PLANE_URL: http://control-plane:8000
      CONTROL_PLANE_TOKEN:
      APPROVAL_HMAC_SECRET: mission-control-secret
    env_file:
      - ./.env
    command: >
      sh /workspace/scripts/run_mission_control_ui.sh
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 30s
    depends_on:
      control-plane:
        condition: service_healthy

  mission-control-gateway:
    image: nginx:1.27-alpine
    container_name: mission-control-gateway
    restart: unless-stopped
    volumes:
      - ./docker/mission-control-gateway.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 10s
    depends_on:
      mission-control-ui:
        condition: service_healthy
      control-plane:
        condition: service_healthy
      market-data:
        condition: service_healthy

  mission-control-tls:
    image: nginx:1.27-alpine
    container_name: mission-control-tls
    restart: unless-stopped
    volumes:
      - ./docker/mission-control-tls.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/certbot/www:/var/www/certbot
      - ./secrets/tls:/etc/letsencrypt
    command: >
      sh -c "apk add --no-cache openssl >/dev/null &&
      mkdir -p /etc/letsencrypt/live/app.txt.gtixt.com &&
      if [ ! -s /etc/letsencrypt/live/app.txt.gtixt.com/fullchain.pem ] || [ ! -s /etc/letsencrypt/live/app.txt.gtixt.com/privkey.pem ]; then
        openssl req -x509 -nodes -newkey rsa:2048 -days 7 -keyout /etc/letsencrypt/live/app.txt.gtixt.com/privkey.pem -out /etc/letsencrypt/live/app.txt.gtixt.com/fullchain.pem -subj '/CN=app.txt.gtixt.com' >/dev/null 2>&1;
      fi &&
      nginx -g 'daemon off;'"
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 15s
    depends_on:
      mission-control-gateway:
        condition: service_healthy

volumes:
  postgres_data:
