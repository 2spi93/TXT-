# ============================================================
# PostgreSQL tuning — Hetzner AX41-NVMe  (64 GB RAM, NVMe SSD)
# Generated for TXT / mission_control
# ============================================================

# --- Mémoire ---
shared_buffers            = 16GB       # 25 % de la RAM
effective_cache_size      = 48GB       # 75 % de la RAM
work_mem                  = 128MB      # par tri/hash (attention : multiplié par workers)
maintenance_work_mem      = 2GB        # VACUUM, CREATE INDEX, etc.
huge_pages                = try        # transparents hugepages si dispo

# --- Workers parallèles ---
max_worker_processes      = 12         # = nb threads Ryzen 5 3600
max_parallel_workers      = 12
max_parallel_workers_per_gather = 6

# --- Connexions ---
max_connections           = 200        # 13 services × ~8 conn + marge

# --- WAL / Checkpoint ---
wal_buffers               = 64MB
checkpoint_completion_target = 0.9
max_wal_size              = 4GB
min_wal_size              = 512MB

# --- NVMe (random_page_cost faible = scan par index favorisé) ---
random_page_cost          = 1.1        # NVMe ≈ 1.0–1.2 (HDD = 4.0)
effective_io_concurrency  = 200        # NVMe peut gérer 200 req parallèles
seq_page_cost             = 1.0

# --- Logging minimal (perf) ---
log_min_duration_statement = 500       # log requêtes > 500 ms seulement
log_checkpoints            = on
log_lock_waits             = on

# --- Autovacuum tuned ---
autovacuum_vacuum_cost_delay    = 2ms  # plus agressif sur NVMe (défaut 20ms)
autovacuum_max_workers          = 4
autovacuum_vacuum_scale_factor  = 0.05

# --- Locale / timezone ---
timezone = 'UTC'
